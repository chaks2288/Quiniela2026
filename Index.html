<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 — Familia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');

  :root {
    --bg: #040D1A;
    --surface: #071426;
    --card: #0B1D33;
    --border: rgba(255,255,255,0.06);
    --gold: #D4AF37;
    --gold2: #F5C842;
    --red: #E53935;
    --blue: #1565C0;
    --teal: #00BFA5;
    --green: #00C853;
    --white: #F0F4FF;
    --muted: rgba(240,244,255,0.45);
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(4,13,26,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px;
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 22px; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a {
    color: var(--muted); font-size: 12px; font-weight: 500;
    text-decoration: none; padding: 6px 12px; border-radius: 6px;
    transition: all .2s; letter-spacing: .5px; text-transform: uppercase;
  }
  .nav-links a:hover { color: var(--white); background: rgba(255,255,255,.05); }

  /* ── SECTIONS ── */
  section { padding: 48px 24px; max-width: 1200px; margin: 0 auto; }
  .section-label {
    font-family: var(--font-display);
    font-size: 11px; letter-spacing: 4px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 36px; letter-spacing: 1px; color: var(--white);
    margin-bottom: 28px; line-height: 1;
  }

  /* ── LIVE HERO ── */
  #live-hero {
    background: linear-gradient(135deg, #071426 0%, #0a1f3a 50%, #071426 100%);
    border-bottom: 1px solid var(--border);
    padding: 0; max-width: 100%;
    position: relative; overflow: hidden;
  }
  #live-hero::before {
    content: 'MUNDIAL 2026';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: var(--font-display);
    font-size: clamp(80px, 20vw, 200px);
    color: rgba(255,255,255,0.02);
    letter-spacing: 8px; white-space: nowrap; pointer-events: none;
    z-index: 0;
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 40px 24px; position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 24px; align-items: center;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--red); border-radius: 4px;
    padding: 3px 10px; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px;
  }
  .live-dot {
    width: 6px; height: 6px; background: white;
    border-radius: 50%; animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .match-live-card {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(212,175,55,.2);
    border-radius: 16px; padding: 28px; text-align: center;
  }
  .match-live-teams {
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }
  .team-block { flex: 1; }
  .team-flag { font-size: 48px; display: block; margin-bottom: 6px; }
  .team-name-live {
    font-family: var(--font-display);
    font-size: 22px; letter-spacing: 1px; color: var(--white);
  }
  .score-display {
    font-family: var(--font-display);
    font-size: 72px; line-height: 1;
    background: linear-gradient(180deg, var(--white) 0%, rgba(240,244,255,.6) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
  }
  .score-sep {
    font-family: var(--font-display);
    font-size: 40px; color: var(--muted); margin: 0 4px;
  }
  .match-meta {
    font-size: 11px; color: var(--muted); margin-top: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .match-minute {
    color: var(--green); font-weight: 600; font-family: var(--font-mono);
  }

  .today-matches-col { display: flex; flex-direction: column; gap: 8px; }
  .today-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 4px;
  }
  .mini-match {
    background: rgba(255,255,255,.03); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .mini-match.upcoming { opacity: .65; }
  .mini-match .mm-time {
    font-family: var(--font-mono); font-size: 11px; color: var(--gold);
    min-width: 40px;
  }
  .mini-match .mm-teams { flex: 1; color: var(--white); font-weight: 500; }
  .mini-match .mm-score {
    font-family: var(--font-mono); font-size: 13px; font-weight: 600;
    color: var(--white); min-width: 36px; text-align: center;
  }
  .mm-status {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    font-weight: 700; letter-spacing: .5px;
  }
  .mm-status.live { background: var(--red); color: white; }
  .mm-status.done { background: rgba(255,255,255,.1); color: var(--muted); }
  .mm-status.soon { background: rgba(212,175,55,.15); color: var(--gold); }

  /* ── PUNTOS CHART ── */
  #puntos { }
  .chart-container {
    display: flex; flex-direction: column; align-items: center;
  }
  #radar-canvas { max-width: 520px; width: 100%; }

  .leaderboard {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; margin-top: 28px; width: 100%;
  }
  .lb-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: transform .2s;
  }
  .lb-card:hover { transform: translateY(-2px); }
  .lb-rank {
    font-family: var(--font-display); font-size: 28px;
    color: var(--muted); min-width: 32px;
  }
  .lb-rank.gold { color: #D4AF37; }
  .lb-rank.silver { color: #A8A9AD; }
  .lb-rank.bronze { color: #CD7F32; }
  .lb-info { flex: 1; }
  .lb-name { font-weight: 600; font-size: 14px; }
  .lb-pts {
    font-family: var(--font-mono); font-size: 13px;
    color: var(--teal); font-weight: 500; margin-top: 2px;
  }
  .lb-bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,.08); border-radius: 2px; margin-top: 6px; }
  .lb-bar { height: 3px; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 2px; }

  /* ── GROUPS ── */
  #grupos .groups-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .group-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  .group-header {
    background: rgba(212,175,55,.08);
    border-bottom: 1px solid rgba(212,175,55,.15);
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .group-name {
    font-family: var(--font-display); font-size: 18px;
    color: var(--gold); letter-spacing: 1px;
  }
  .group-table { width: 100%; border-collapse: collapse; }
  .group-table th {
    font-size: 10px; color: var(--muted); font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 16px 4px; text-align: left;
  }
  .group-table th:not(:first-child) { text-align: center; }
  .group-table td { padding: 7px 16px; font-size: 13px; }
  .group-table td:not(:first-child) { text-align: center; font-family: var(--font-mono); font-size: 12px; }
  .group-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  .group-table tr.qualified td { color: var(--white); }
  .group-table tr.qualified td:first-child { font-weight: 600; }
  .group-table tr.eliminated td { color: var(--muted); }
  .q-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: var(--teal); }
  .pts-cell { color: var(--gold) !important; font-weight: 700 !important; }

  /* ── PARTICIPANTES ── */
  #participantes .players-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }
  .player-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 12px; text-align: center;
    cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .player-pill::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,.08), transparent);
    opacity: 0; transition: opacity .2s;
  }
  .player-pill:hover { border-color: rgba(212,175,55,.4); transform: translateY(-3px); }
  .player-pill:hover::before { opacity: 1; }
  .player-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 18px; color: white;
    margin: 0 auto 8px;
  }
  .player-pill-name { font-size: 13px; font-weight: 600; }
  .player-pill-pts { font-family: var(--font-mono); font-size: 12px; color: var(--gold); margin-top: 3px; }
  .player-pill-rank { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid rgba(212,175,55,.2);
    border-radius: 20px; width: 100%; max-width: 680px;
    max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: var(--font-display); font-size: 24px; letter-spacing: 1px; }
  .modal-pts { font-family: var(--font-mono); color: var(--teal); font-size: 16px; }
  .modal-close {
    background: none; border: none; color: var(--muted); font-size: 24px;
    cursor: pointer; padding: 4px; line-height: 1; transition: color .2s;
  }
  .modal-close:hover { color: var(--white); }
  .modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; }
  .modal-section-title {
    font-family: var(--font-display); font-size: 14px; letter-spacing: 2px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 12px; margin-top: 20px;
  }
  .modal-section-title:first-child { margin-top: 0; }
  .pred-table { width: 100%; border-collapse: collapse; }
  .pred-table th {
    font-size: 10px; color: var(--muted); font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px;
    text-align: left; border-bottom: 1px solid var(--border);
  }
  .pred-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.04); }
  .pred-table td.score { font-family: var(--font-mono); font-weight: 600; text-align: center; }
  .pred-result { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 700; }
  .pred-result.exact { background: rgba(0,200,83,.15); color: var(--green); }
  .pred-result.correct { background: rgba(0,191,165,.15); color: var(--teal); }
  .pred-result.wrong { background: rgba(229,57,53,.1); color: #ff6b6b; }
  .pred-result.pending { background: rgba(255,255,255,.07); color: var(--muted); }

  /* ── CALENDARIO ── */
  #calendario .cal-day { margin-bottom: 28px; }
  .cal-date {
    font-family: var(--font-display); font-size: 16px; letter-spacing: 2px;
    color: var(--gold); text-transform: uppercase;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .cal-matches { display: flex; flex-direction: column; gap: 8px; }
  .cal-match {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    display: grid; grid-template-columns: 60px 1fr auto 1fr auto;
    align-items: center; gap: 12px; transition: border-color .2s;
  }
  .cal-match:hover { border-color: rgba(212,175,55,.25); }
  .cal-match.finished { opacity: .8; }
  .cal-time {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--muted); text-align: center;
  }
  .cal-team { font-size: 13px; font-weight: 500; }
  .cal-team.right { text-align: right; }
  .cal-score {
    font-family: var(--font-display); font-size: 20px;
    color: var(--white); text-align: center; letter-spacing: 2px;
    min-width: 60px;
  }
  .cal-score.pending { color: var(--muted); font-size: 14px; }
  .cal-group-tag {
    font-size: 10px; color: var(--gold); background: rgba(212,175,55,.1);
    padding: 2px 7px; border-radius: 4px; font-weight: 700;
    letter-spacing: 1px; text-align: center;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 40px 24px;
    color: var(--muted); font-size: 12px; border-top: 1px solid var(--border);
  }
  footer span { color: var(--gold); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

  /* ── UTILS ── */
  .flag { font-size: 18px; margin-right: 6px; }
  .divider { height: 1px; background: var(--border); margin: 0 24px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }

  @media (max-width: 768px) {
    .hero-inner { grid-template-columns: 1fr; }
    .today-matches-col:last-child { display: none; }
    nav .nav-links { display: none; }
    .cal-match { grid-template-columns: 50px 1fr auto 1fr; }
    .cal-group-tag { display: none; }
    .score-display { font-size: 52px; }
  }
</style>
</head>

<section id="calendario">

// SCORING ENGINE
// ═══════════════════════════════════════════
function getResult(g1, g2) {
  if(g1 > g2) return "W1";
  if(g2 > g1) return "W2";
  return "D";
}

function calcPoints(player) {
  let pts = 0;
  MATCHES.forEach((m, i) => {
    const key = `${m.t1} vs ${m.t2}`;
    const real = REAL_RESULTS[key];
    if(!real) return;
    const pred = PREDS[player] && PREDS[player][i];
    if(!pred) return;
    const [rg1, rg2] = real;
    const [pg1, pg2] = pred;
    if(pg1 === rg1 && pg2 === rg2) { pts += 3; return; }
    if(getResult(pg1,pg2) === getResult(rg1,rg2)) pts += 1;
  });
  return pts;
}

function getPredResult(player, matchIdx) {
  const m = MATCHES[matchIdx];
  const key = `${m.t1} vs ${m.t2}`;
  const real = REAL_RESULTS[key];
  const pred = PREDS[player] && PREDS[player][matchIdx];
  if(!pred) return "pending";
  if(!real) return "pending";
  const [rg1, rg2] = real;
  const [pg1, pg2] = pred;
  if(pg1 === rg1 && pg2 === rg2) return "exact";
  if(getResult(pg1,pg2) === getResult(rg1,rg2)) return "correct";
  return "wrong";
}

// ═══════════════════════════════════════════
// RADIAL BAR CHART (Canvas)
// ═══════════════════════════════════════════
function drawRadialChart() {
  const canvas = document.getElementById('radar-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const players = sorted.slice(0, 15); // show top 15 in chart
  const n = players.length;
  const innerR = 60, outerR = 200;
  ctx.clearRect(0,0,W,H);

  // BG rings
  for(let r = innerR; r <= outerR; r += (outerR-innerR)/4) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Bars
  players.forEach((player, i) => {
    const angle = (i/n)*Math.PI*2 - Math.PI/2;
    const pct = SCORES[player] / maxScore;
    const barLen = (outerR - innerR) * pct;
    const startR = innerR, endR = innerR + barLen;
    const sliceAngle = (Math.PI*2/n)*0.75;

    // Gradient bar
    const gx1 = cx + startR*Math.cos(angle), gy1 = cy + startR*Math.sin(angle);
    const gx2 = cx + endR*Math.cos(angle), gy2 = cy + endR*Math.sin(angle);
    const grad = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
    grad.addColorStop(0, '#00BFA5');
    grad.addColorStop(1, '#D4AF37');

    ctx.beginPath();
    ctx.moveTo(cx + startR*Math.cos(angle - sliceAngle/2), cy + startR*Math.sin(angle - sliceAngle/2));
    ctx.arc(cx, cy, startR, angle - sliceAngle/2, angle + sliceAngle/2);
    ctx.arc(cx, cy, endR, angle + sliceAngle/2, angle - sliceAngle/2, true);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label
    const labelR = outerR + 28;
    const lx = cx + labelR*Math.cos(angle);
    const ly = cy + labelR*Math.sin(angle);
    ctx.save();
    ctx.translate(lx, ly);
    let rot = angle + Math.PI/2;
    if(lx < cx) rot += Math.PI;
    ctx.rotate(rot);
    ctx.fillStyle = '#F0F4FF';
    ctx.font = '600 11px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(player, 0, 0);
    ctx.fillStyle = '#D4AF37';
    ctx.font = '500 10px Roboto Mono';
    ctx.fillText(SCORES[player]+'pts', 0, 13);
    ctx.restore();
  });

  // Center label
  ctx.fillStyle = 'rgba(212,175,55,0.15)';
  ctx.beginPath(); ctx.arc(cx, cy, innerR-4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#D4AF37';
  ctx.font = 'bold 13px Bebas Neue';
  ctx.textAlign = 'center';
  ctx.fillText('PUNTOS', cx, cy-6);
  ctx.fillStyle = 'rgba(240,244,255,0.5)';
  ctx.font = '10px Inter';
  ctx.fillText('QUINIELA', cx, cy+8);
}

function calcGroupTable(group) {
  const teams = GROUP_TEAMS[group];
  const stats = {};
  teams.forEach(t => stats[t]={pts:0,gf:0,ga:0,gd:0,pj:0,w:0,d:0,l:0});
  MATCHES.filter(m => m.g === group).forEach(m => {
    const key = `${m.t1} vs ${m.t2}`;
    const real = REAL_RESULTS[key];
    if(!real) return;
    const [g1,g2] = real;
    stats[m.t1].pj++; stats[m.t2].pj++;
    stats[m.t1].gf+=g1; stats[m.t1].ga+=g2; stats[m.t1].gd+=(g1-g2);
    stats[m.t2].gf+=g2; stats[m.t2].ga+=g1; stats[m.t2].gd+=(g2-g1);
    if(g1>g2){stats[m.t1].pts+=3;stats[m.t1].w++;stats[m.t2].l++;}
    else if(g2>g1){stats[m.t2].pts+=3;stats[m.t2].w++;stats[m.t1].l++;}
    else{stats[m.t1].pts+=1;stats[m.t2].pts+=1;stats[m.t1].d++;stats[m.t2].d++;}
  });
  return Object.entries(stats).sort((a,b)=>b[1].pts-a[1].pts||b[1].gd-a[1].gd||b[1].gf-a[1].gf);
}

function buildGroups() {
  const el = document.getElementById('groups-grid');
  Object.keys(GROUP_TEAMS).forEach(g => {
    const table = calcGroupTable(g);
    let rows = '';
    table.forEach(([team, s], i) => {
      const cls = i<2?'qualified':'eliminated';
      const dot = i<2?`<span class="q-dot"></span>`:'';
      const flag = FLAGS[team]||'🏳';
      rows += `<tr class="${cls}">
        <td>${dot}${flag} ${team}</td>
        <td>${s.pj}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}:${s.ga}</td>
        <td class="pts-cell">${s.pts}</td>
      </tr>`;
    });
    el.innerHTML += `
      <div class="group-card">
        <div class="group-header">
          <div class="group-name">Grupo ${g}</div>
        </div>
        <table class="group-table">
          <thead><tr>
            <th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF:GC</th><th>Pts</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });
}

      ['#1565C0','#00BFA5'],['#6A1B9A','#E91E63'],['#E65100','#FFC107'],
      ['#1B5E20','#76FF03'],['#880E4F','#FF4081'],['#0D47A1','#40C4FF'],
      ['#BF360C','#FFAB40'],['#1A237E','#82B1FF'],['#33691E','#CCFF90'],
      ['#F57F17','#FF6D00'],['#37474F','#90A4AE'],['#4A148C','#CE93D8'],
    ];
    const [c1,c2] = colors[PLAYERS.indexOf(p)%colors.length];
    const rank = ranks[p];
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    el.innerHTML += `
      <div class="player-pill" onclick="openModal('${p}')">
        <div class="player-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${initials}</div>
        <div class="player-pill-name">${p} ${medal}</div>
        <div class="player-pill-pts">${SCORES[p]} pts</div>
        <div class="player-pill-rank">#${rank}</div>
      </div>`;
  });
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(player) {
  document.getElementById('modal-name').textContent = player;
  document.getElementById('modal-pts').textContent = `${SCORES[player]} puntos`;
  const body = document.getElementById('modal-body');

  // Group by match day
  const days = {};
  MATCHES.forEach((m, i) => {
    if(!days[m.d]) days[m.d] = [];
    days[m.d].push({m, i});
  });

  let html = '';
  Object.entries(days).forEach(([day, entries]) => {
    html += `<div class="modal-section-title">${day}</div>`;
    html += `<table class="pred-table"><thead><tr>
      <th>Partido</th><th>Pronóstico</th><th>Real</th><th>Pts</th>
    </tr></thead><tbody>`;
    entries.forEach(({m, i}) => {
      const key = `${m.t1} vs ${m.t2}`;
      const real = REAL_RESULTS[key];
      const pred = PREDS[player] && PREDS[player][i];
      const resKey = getPredResult(player, i);
      const resLabel = resKey==='exact'?'3 pts':resKey==='correct'?'1 pt':resKey==='wrong'?'0':'—';
      const predStr = pred ? `${pred[0]}-${pred[1]}` : '—';
      const realStr = real ? `${real[0]}-${real[1]}` : 'Pendiente';
      const f1 = FLAGS[m.t1]||'🏳', f2 = FLAGS[m.t2]||'🏳';
      html += `<tr>
        <td>${f1} ${m.t1} vs ${m.t2} ${f2}</td>
        <td class="score">${predStr}</td>
        <td class="score">${realStr}</td>
        <td><span class="pred-result ${resKey}">${resLabel}</span></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  });

  body.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if(e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
function buildCalendar() {
  const el = document.getElementById('calendar-container');
  const days = {};
  MATCHES.forEach(m => {
    if(!days[m.d]) days[m.d] = [];
    days[m.d].push(m);
  });

  Object.entries(days).forEach(([day, ms]) => {
    let matches = '';
    ms.forEach(m => {
      const key = `${m.t1} vs ${m.t2}`;
      const real = REAL_RESULTS[key];
      const f1 = FLAGS[m.t1]||'🏳', f2 = FLAGS[m.t2]||'🏳';
      const scoreStr = real ? `${real[0]}-${real[1]}` : 'vs';
      const cls = real?'finished':'';
      const scoreClass = real?'':'pending';
      matches += `<div class="cal-match ${cls}">
        <div class="cal-time">${m.t}</div>
        <div class="cal-team">${f1} ${m.t1}</div>
        <div class="cal-score ${scoreClass}">${scoreStr}</div>
        <div class="cal-team right">${m.t2} ${f2}</div>
        <div class="cal-group-tag">Grupo ${m.g}</div>
      </div>`;
    });
    el.innerHTML += `<div class="cal-day">
      <div class="cal-date">${day}</div>
      <div class="cal-matches">${matches}</div>
    </div>`;
  });
}

// ═══════════════════════════════════════════
// LIVE SECTION — football-data.org API
// ═══════════════════════════════════════════
const API_KEY = 'ad66e3615312443b9c22ee35561da1c3';

const PROXY = 'https://corsproxy.io/?url=';

async function fetchLiveMatches() {
  try {
    const url = PROXY + encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches?status=IN_PLAY,PAUSED');
    const res = await fetch(url, { headers: { 'X-Auth-Token': API_KEY } });
    const data = await res.json();
    return data.matches || [];
  } catch(e) { return []; }
}

async function fetchTodayMatches() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const url = PROXY + encodeURIComponent(`https://api.football-data.org/v4/competitions/WC/matches?dateFrom=${today}&dateTo=${today}`);
    const res = await fetch(url, { headers: { 'X-Auth-Token': API_KEY } });
    const data = await res.json();
    return data.matches || [];
  } catch(e) { return []; }
}

function teamNameShort(name) {
  const map = {
    'Mexico':'Mexico','South Africa':'Sudáfrica','South Korea':'Corea',
    'Czechia':'Chequia','Canada':'Canáda','Bosnia and Herzegovina':'Bosnia',
    'United States':'EE.UU.','Paraguay':'Paraguay','Qatar':'Catar','Switzerland':'Suiza',
    'Brazil':'Brasil','Morocco':'Marruecos','Haiti':'Haití','Scotland':'Escocia',
    'Australia':'Australia','Türkiye':'Turquia','Germany':'Alemania','Curaçao':'Curazao',
    'Netherlands':'Paises Bajos','Japan':'Japón','Ivory Coast':'C. de Marfil','Ecuador':'Ecuador',
    'Sweden':'Suecia','Tunisia':'Túnez','Spain':'España','Cape Verde':'Cabo Verde',
    'Saudi Arabia':'Arabia S.','Uruguay':'Uruguay','Iran':'Irán','New Zealand':'Nva. Zelanda',
    'Belgium':'Bélgica','Egypt':'Egipto','France':'Francia','Senegal':'Senegal',
    'Iraq':'Irak','Norway':'Noruega','Argentina':'Argentina','Algeria':'Argelia',
    'Austria':'Austria','Jordan':'Jordania','Portugal':'Portugal','DR Congo':'Congo',
    'England':'Inglaterra','Croatia':'Croacia','Ghana':'Ghana','Panama':'Panamá',
    'Uzbekistan':'Uzbekistán','Colombia':'Colombia',
  };
  return map[name] || name;
}

async function updateLiveSection() {
  const live = await fetchLiveMatches();
  const today = await fetchTodayMatches();

  // Main live card
  if(live.length > 0) {
    const m = live[0];
    const t1 = teamNameShort(m.homeTeam.name);
    const t2 = teamNameShort(m.awayTeam.name);
    document.getElementById('live-team1').textContent = t1;
    document.getElementById('live-team2').textContent = t2;
    document.getElementById('live-flag1').textContent = FLAGS[t1]||'⚽';
    document.getElementById('live-flag2').textContent = FLAGS[t2]||'⚽';
    document.getElementById('live-s1').textContent = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? '0';
    document.getElementById('live-s2').textContent = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? '0';
    document.getElementById('live-min').textContent = m.minute ? `${m.minute}'` : 'EN VIVO';
    document.getElementById('live-venue').textContent = m.venue || '';
  } else {
    // No live match right now
    document.querySelector('.live-badge').innerHTML = '<div class="live-dot" style="background:#D4AF37"></div> PRÓXIMO';
    document.getElementById('live-s1').textContent = '—';
    document.getElementById('live-s2').textContent = '—';
    document.getElementById('live-min').textContent = '';

    // Show next upcoming
    const upcoming = today.filter(m=>m.status==='TIMED'||m.status==='SCHEDULED');
    if(upcoming.length>0) {
      const m = upcoming[0];
      const t1 = teamNameShort(m.homeTeam.name);
      const t2 = teamNameShort(m.awayTeam.name);
      document.getElementById('live-team1').textContent = t1;
      document.getElementById('live-team2').textContent = t2;
      document.getElementById('live-flag1').textContent = FLAGS[t1]||'⚽';
      document.getElementById('live-flag2').textContent = FLAGS[t2]||'⚽';
      const kickoff = new Date(m.utcDate).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Mexico_City'});
      document.getElementById('live-min').textContent = kickoff;
      document.getElementById('live-venue').textContent = 'Tiempo de México';
    }
  }

  // Side panels — today matches
  const leftEl = document.getElementById('today-left');
  const rightEl = document.getElementById('today-right');
  leftEl.innerHTML = '<div class="today-label">Hoy</div>';
  rightEl.innerHTML = '<div class="today-label">Más tarde</div>';

  const finished = today.filter(m=>m.status==='FINISHED');
  const upcoming2 = today.filter(m=>m.status==='TIMED'||m.status==='SCHEDULED');

  finished.slice(0,3).forEach(m => {
    const t1 = teamNameShort(m.homeTeam.name);
    const t2 = teamNameShort(m.awayTeam.name);
    leftEl.innerHTML += `<div class="mini-match">
      <div class="mm-time">${new Date(m.utcDate).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Mexico_City'})}</div>
      <div class="mm-teams">${FLAGS[t1]||''} ${t1} vs ${t2} ${FLAGS[t2]||''}</div>
      <div class="mm-score">${m.score?.fullTime?.home}-${m.score?.fullTime?.away}</div>
      <div class="mm-status done">FIN</div>
    </div>`;
  });

  upcoming2.slice(0,3).forEach(m => {
    const t1 = teamNameShort(m.homeTeam.name);
    const t2 = teamNameShort(m.awayTeam.name);
    rightEl.innerHTML += `<div class="mini-match upcoming">
      <div class="mm-time">${new Date(m.utcDate).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Mexico_City'})}</div>
      <div class="mm-teams">${FLAGS[t1]||''} ${t1} vs ${t2} ${FLAGS[t2]||''}</div>
      <div class="mm-score">-</div>
      <div class="mm-status soon">PRONTO</div>
    </div>`;
  });

  if(!today.length) {
    leftEl.innerHTML += '<div style="color:var(--muted);font-size:12px;padding:10px 0">No hay partidos hoy</div>';
    rightEl.innerHTML += '<div style="color:var(--muted);font-size:12px;padding:10px 0">—</div>';
  }
}
